<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>火芯的小窝</title>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>

  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <script>
    // 主题切换功能
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const html = document.documentElement;

    // 检查系统偏好
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme');

    // 设置初始主题
    if (savedTheme) {
      html.setAttribute('data-theme', savedTheme);
      updateIcon(savedTheme);
    } else if (prefersDark) {
      html.setAttribute('data-theme', 'dark');
      updateIcon('dark');
    }

    // 切换主题
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateIcon(newTheme);
    });

    // 更新图标
    function updateIcon(theme) {
      if (theme === 'dark') {
        themeIcon.innerHTML = `
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        `;
      } else {
        themeIcon.innerHTML = `
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        `;
      }
    }

    // 监听系统主题变化
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        const newTheme = e.matches ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        updateIcon(newTheme);
      }
    });
  </script>
  
  <!-- ===== 组件一：头像 + 信息 ===== -->
  <section class="profile-wrap" aria-label="个人资料">
    <!-- 头像容器：气泡相对于此定位，尖角贴近头像 -->

        class="avatar"

        alt="火芯Ah 的头像"

    <!-- 名称与描述（默认显示） -->

  <!-- 一言区域 -->
  <div class="hitokoto-wrap" id="hitokoto-wrap">
    <div class="hitokoto-content">
      <span class="quote-mark">「</span>
      <span id="hitokoto-text">加载中...</span>
      <span class="quote-mark">」</span>
    </div>
    <div class="hitokoto-actions">
      <button class="action-btn" id="copy-btn" title="复制">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="action-btn" id="refresh-btn" title="换一句">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="action-btn" id="search-btn" title="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // 本地诗词列表（随机选取）
    const poems = [
      '落霞与孤鹜齐飞，秋水共长天一色',
      '山重水复疑无路，柳暗花明又一村',
      '春风得意马蹄疾，一日看尽长安花',
      '人生若只如初见，何事秋风悲画扇',
      '曾经沧海难为水，除却巫山不是云',
      '愿得一心人，白头不相离',
      '两情若是久长时，又岂在朝朝暮暮',
      '入我相思门，知我相思苦',
      '问世间，情为何物，直教生死相许',
      '衣带渐宽终不悔，为伊消得人憔悴',
      '众里寻他千百度，蓦然回首，那人却在，灯火阑珊处',
      '此情可待成追忆，只是当时已惘然',
      '人生得意须尽欢，莫使金樽空对月',
      '天生我材必有用，千金散尽还复来',
      '长风破浪会有时，直挂云帆济沧海'
    ];

    function fetchHitokoto() {
      const random = poems[Math.floor(Math.random() * poems.length)];
      document.getElementById('hitokoto-text').textContent = random;
    }

    // 页面加载时获取一言
    fetchHitokoto();

    // 复制功能
    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = document.getElementById('hitokoto-text').textContent;
      navigator.clipboard.writeText(text);
      const btn = document.getElementById('copy-btn');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
      btn.style.color = 'var(--accent)';
      setTimeout(() => {
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        btn.style.color = '';
      }, 1500);
    });

    // 刷新功能
    document.getElementById('refresh-btn').addEventListener('click', fetchHitokoto);

    // 搜索功能（必应）
    document.getElementById('search-btn').addEventListener('click', () => {
      const text = document.getElementById('hitokoto-text').textContent;
      window.open('https://www.bing.com/search?q=' + encodeURIComponent(text), '_blank');
    });
  </script>
